services:
  postgres:
    image: postgres:18

    env_file:
      - .env

    ports:
      - "5433:5432"
    
    volumes:
      - pgdata:/var/lib/postgresql
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gopgtest"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
  
  redis:
    image: redis:8.6.4-trixie
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    
    ports:
      - "8080:8080"

    env_file:
      - .env
    
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata: